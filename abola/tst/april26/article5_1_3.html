<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YL3 step1 with mapping</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
    .wrap { max-width: 1260px; margin: 0 auto; }
    .slot { margin: 24px auto; background: #fff; border: 1px dashed #bbb; display: flex; align-items: center; justify-content: center; min-height: 250px; }
    #horz1 { min-height: 250px; }
    #inline1, #inline2, #vert1, #vert2, #mrec2 { min-height: 250px; }
    .label { font-size: 12px; color: #666; margin-bottom: 6px; }
    #yl-debug-overlay {
      position: fixed;
      left: 8px;
      bottom: 8px;
      z-index: 2147483647;
      width: min(92vw, 760px);
      max-height: 60vh;
      overflow: auto;
      background: rgba(0,0,0,.92);
      color: #0f0;
      font: 12px/1.35 monospace;
      padding: 8px;
      border: 1px solid #0f0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #yl-debug-overlay .title { color: #fff; font-weight: bold; margin-bottom: 6px; }
  </style>
  <script>
    window.googletag = window.googletag || { cmd: [] };
    window.yieldlove_cmd = window.yieldlove_cmd || [];
    window.yieldlove_prevent_autostart = true;

    function dbg(label, payload) {
      try {
        var body = document.getElementById('yl-debug-body');
        if (!body) return;
        var line = document.createElement('div');
        var ts = new Date().toISOString().slice(11, 23);
        var text = '[' + ts + '] ' + label;
        if (payload !== undefined) {
          try { text += ' ' + JSON.stringify(payload); }
          catch (e) { text += ' ' + String(payload); }
        }
        line.textContent = text;
        body.appendChild(line);
        while (body.childNodes.length > 220) body.removeChild(body.firstChild);
      } catch (e) {}
    }

    function installOverlay() {
      if (document.getElementById('yl-debug-overlay')) return;
      var box = document.createElement('div');
      box.id = 'yl-debug-overlay';
      box.innerHTML = '<div class="title">YL / GPT DEBUG</div><div id="yl-debug-body"></div>';
      document.body.appendChild(box);
    }

    function makeMappings() {
      return {
        horz: googletag.sizeMapping()
          .addSize([1025, 0], [[1260,220],[1150,250],[970,250],[970,90],[728,90],[640,100],[468,60],[460,60]])
          .addSize([768, 0], [[728,90],[640,100],[468,60],[460,60]])
          .addSize([0, 0], [[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1]])
          .build(),
        inline: googletag.sizeMapping()
          .addSize([1025, 0], [[300,250],[336,320],[336,280],[250,250],[200,200],[640,100],[468,60],[460,60],'fluid'])
          .addSize([768, 0], [[300,250],[336,320],[336,280],[250,250],[200,200],[468,60],[460,60]])
          .addSize([0, 0], [[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[300,250],[1,1]])
          .build(),
        vert: googletag.sizeMapping()
          .addSize([1025, 0], [[300,600],[300,250],[336,600],[336,320],[336,280],[160,600],[120,600],[250,250],[200,200],'fluid'])
          .addSize([768, 0], [[300,600],[300,250],[336,320],[336,280],[250,250],[200,200]])
          .addSize([0, 0], [[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[300,250],[1,1]])
          .build(),
        mrec: googletag.sizeMapping()
          .addSize([1025, 0], [[300,250],[320,100],[250,250],[200,200],[1,1],'fluid'])
          .addSize([768, 0], [[300,250],[320,100],[250,250],[200,200]])
          .addSize([0, 0], [[320,100],[300,250],[250,250],[200,200],[1,1]])
          .build()
      };
    }

    function defineAndAttach(path, sizes, mapping, slotId) {
      googletag.cmd.push(function() {
        try {
          dbg('defineSlot.call', { slotId: slotId, path: path });
          var slot = googletag.defineSlot(path, sizes, slotId)
            .defineSizeMapping(mapping)
            .addService(googletag.pubads());
          dbg('defineSlot.return', { ok: !!slot, slotId: slotId, path: path });
          googletag.display(slotId);
          dbg('gpt.display.call', { slotId: slotId });

          yieldlove_cmd.push(function () {
            dbg('yl.lazyload.attach', { slotId: slotId, path: path });
            YLHH.utils.lazyLoad(slotId, function () {
              dbg('yl.lazyload.fire', { slotId: slotId, path: path });
              try {
                YLHH.bidder.cloneUnit(path, slotId, true);
                dbg('yl.clone.success', { slotId: slotId, path: path });
              } catch (e) {
                dbg('yl.clone.error', { slotId: slotId, path: path, message: e && e.message ? e.message : String(e) });
              }
            });
          });
        } catch (e) {
          dbg('defineSlot.error', { slotId: slotId, message: e && e.message ? e.message : String(e) });
        }
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      installOverlay();
      dbg('env', {
        ua: navigator.userAgent,
        width: window.innerWidth,
        height: window.innerHeight,
        dpr: window.devicePixelRatio || 1
      });

      window.addEventListener('yieldlove.auctionStarted', function(ev) {
        dbg('yieldlove.auctionStarted', ev && ev.detail ? ev.detail : {});
      });
      window.addEventListener('yieldlove.auctionEnded', function(ev) {
        dbg('yieldlove.auctionEnded', ev && ev.detail ? ev.detail : {});
      });
      window.addEventListener('yieldlove.bidWon', function(ev) {
        dbg('yieldlove.bidWon', ev && ev.detail ? ev.detail : {});
      });

      var gpt = document.createElement('script');
      gpt.async = true;
      gpt.src = 'https://securepubads.g.doubleclick.net/tag/js/gpt.js';
      gpt.crossOrigin = 'anonymous';
      gpt.onload = function() {
        dbg('gpt.script.loaded');
        googletag.cmd.push(function() {
          googletag.pubads().enableSingleRequest();
          googletag.enableServices();
          dbg('gpt.enableServices');

          var pubads = googletag.pubads();
          pubads.addEventListener('slotRequested', function(event) {
            var slot = event.slot;
            dbg('gpt.slotRequested', { id: slot.getSlotElementId(), path: slot.getAdUnitPath() });
          });
          pubads.addEventListener('slotResponseReceived', function(event) {
            var slot = event.slot;
            dbg('gpt.slotResponseReceived', { id: slot.getSlotElementId(), path: slot.getAdUnitPath() });
          });
          pubads.addEventListener('slotRenderEnded', function(event) {
            var slot = event.slot;
            dbg('gpt.slotRenderEnded', {
              id: slot.getSlotElementId(),
              path: slot.getAdUnitPath(),
              isEmpty: !!event.isEmpty,
              size: event.size || null,
              lineItemId: event.lineItemId || null,
              creativeId: event.creativeId || null
            });
          });

          var mappings = makeMappings();
          defineAndAttach('/417417404/horz', [[1260,220],[1150,250],[970,250],[970,90],[728,90],[640,100],[468,60],[460,60],[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1]], mappings.horz, 'horz1');
          defineAndAttach('/417417404/inline', [[300,250],[336,320],[336,280],[250,250],[200,200],[640,100],[468,60],[460,60],[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1],'fluid'], mappings.inline, 'inline1');
          defineAndAttach('/417417404/inline', [[300,250],[336,320],[336,280],[250,250],[200,200],[640,100],[468,60],[460,60],[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1],'fluid'], mappings.inline, 'inline2');
          defineAndAttach('/417417404/vert', [[300,600],[300,250],[336,600],[336,320],[336,280],[160,600],[120,600],[250,250],[200,200],[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1],'fluid'], mappings.vert, 'vert1');
          defineAndAttach('/417417404/vert', [[300,600],[300,250],[336,600],[336,320],[336,280],[160,600],[120,600],[250,250],[200,200],[320,100],[320,160],[300,120],[320,50],[300,100],[300,75],[300,50],[1,1],'fluid'], mappings.vert, 'vert2');
          defineAndAttach('/417417404/mrec', [[300,250],[320,100],[250,250],[200,200],[1,1],'fluid'], mappings.mrec, 'mrec2');
        });
      };
      gpt.onerror = function() { dbg('gpt.script.error'); };
      document.head.appendChild(gpt);

      var yl = document.createElement('script');
      yl.async = true;
      yl.src = 'https://cdn-a.yieldlove.com/v2/yieldlove.js?abola.pt';
      yl.onload = function() { dbg('yl.script.loaded'); };
      yl.onerror = function() { dbg('yl.script.error'); };
      document.head.appendChild(yl);
    });
  </script>
</head>
<body>
  <div class="wrap">
    <h1>Yieldlove step 1 with size mapping</h1>
    <p>Base do yl3.html com size mapping reintroduzido e sem interstitial/oop/footersticky.</p>

    <div class="label">horz1 → /417417404/horz</div>
    <div id="horz1" class="slot"></div>

    <div class="label">inline1 → /417417404/inline</div>
    <div id="inline1" class="slot"></div>

    <div class="label">inline2 → /417417404/inline</div>
    <div id="inline2" class="slot"></div>

    <div class="label">vert1 → /417417404/vert</div>
    <div id="vert1" class="slot"></div>

    <div class="label">vert2 → /417417404/vert</div>
    <div id="vert2" class="slot"></div>

    <div class="label">mrec2 → /417417404/mrec</div>
    <div id="mrec2" class="slot"></div>
  </div>
  <div id="yl-debug-overlay"><div class="title">YL / GPT DEBUG</div><div id="yl-debug-body"></div></div>
</body>
</html>
