<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Só Publicidade</title>
  <link rel="stylesheet" href="assets/videojs/vendor/video-js.min.css">
  <link rel="stylesheet" href="assets/videojs/vendor/videojs.ads.css">
  <link rel="stylesheet" href="assets/videojs/vendor/videojs.ima.css">
  <link rel="stylesheet" href="assets/videojs/css/publisher-video-player.css">

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #222; background: #fff; }
    main { max-width: 980px; margin: 0 auto; padding: 32px 16px 80px; }
    h1 { font-size: clamp(28px, 4vw, 46px); line-height: 1.05; margin: 0 0 12px; }
    h2 { margin-top: 36px; }
    p { font-size: 17px; line-height: 1.65; }
    code { background: #f2f2f2; padding: 2px 5px; border-radius: 5px; }
    .setup-box { background: #f7f7f7; border: 1px solid #e3e3e3; border-radius: 12px; padding: 16px; margin: 24px 0; }
    .demo-links { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0 28px; }
    .demo-links a { color: #111; background: #eee; border: 1px solid #ddd; border-radius: 999px; padding: 9px 13px; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <h1>Só publicidade</h1>
    <p>Este exemplo não tem <code>data-video-src</code>. Usa um conteúdo técnico local mínimo para o IMA tratar a publicidade como preroll, e depois pára/colapsa.</p>

    <div class="pub-video-shell" data-publisher-video data-player-mode="ad-only" data-ad-only="true" data-muted="true" data-autoplay="false" data-collapse-on-ad-end="true" data-collapse-delay="1000" data-ad-tag-url="https://pubads.g.doubleclick.net/gampad/ads?iu=/4458504/Video&description_url=[placeholder]&tfcd=0&npa=0&sz=1x1%7C1x1%7C300x1%7C300x250%7C640x360%7C640x360&gdfp_req=1&unviewed_position_start=1&output=vast&env=vp&impl=s&cust_params=end%3Dsticky&correlator=" data-sticky="false">
      <video class="video-js vjs-default-skin" controls muted playsinline preload="metadata"></video>
      <div class="pub-video-status" data-video-status>Waiting for viewport initialization</div>
    </div>

    <div class="setup-box">
      <p>Para usar como ad-only/outstream na página, mantém <code>data-ad-only="true"</code> e não coloques <code>data-video-src</code>.</p>
    </div>
  </main>

  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <script src="assets/videojs/vendor/video.min.js"></script>
  <script src="assets/videojs/vendor/videojs.ads.min.js"></script>
  <script src="assets/videojs/vendor/videojs.ima.min.js"></script>
  <script src="assets/videojs/js/gam-ad-tag-builder.js"></script>
  <script src="assets/videojs/js/publisher-video-player.js"></script>
</body>
</html>
